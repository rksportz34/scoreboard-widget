<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enoch's Scoreboard</title>
<style>
  :root {
    --bg: #050b14;
    --panel: #101827;
    --panel2: #172235;
    --panel3: #0d1422;
    --text: #f8fafc;
    --muted: #aab6c8;
    --border: rgba(255,255,255,.12);
    --live: #ef4444;
    --upcoming: #60a5fa;
    --final: #22c55e;
    --gold: #f59e0b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: transparent;
    color: var(--text);
  }

  .widget {
    width: 100%;
    min-width: 300px;
    background:
      radial-gradient(circle at top left, rgba(191,87,0,.28), transparent 34%),
      radial-gradient(circle at top right, rgba(0,53,148,.24), transparent 32%),
      linear-gradient(145deg, var(--bg), #0b1320);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 14px 35px rgba(0,0,0,.35);
  }

  .topbar {
    padding: 16px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(8px);
  }

  .title {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -.02em;
  }

  .updated {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
  }

  .tabs {
    display: flex;
    gap: 7px;
    padding: 12px 14px 0;
    overflow-x: auto;
  }

  .tab {
    border: 1px solid var(--border);
    background: rgba(255,255,255,.07);
    color: var(--text);
    border-radius: 999px;
    padding: 7px 11px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }

  .tab.active {
    background: rgba(255,255,255,.18);
    font-weight: 800;
  }

  .content {
    padding: 14px;
  }

  .section {
    margin-bottom: 16px;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
    font-size: 13px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: .04em;
    margin: 0 0 9px 2px;
  }

  .section-title span {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-transform: none;
    letter-spacing: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
    gap: 10px;
  }

  .card {
    background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025));
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    background: rgba(255,255,255,.05);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 34px;
    height: 34px;
    object-fit: contain;
    background: rgba(255,255,255,.94);
    border-radius: 50%;
    padding: 3px;
    flex: 0 0 auto;
  }

  .team-title {
    min-width: 0;
  }

  .team-title strong {
    display: block;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sport {
    color: var(--muted);
    font-size: 11px;
    margin-top: 2px;
  }

  .game {
    padding: 12px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: .03em;
    padding: 5px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,.10);
    color: var(--muted);
    margin-bottom: 9px;
  }

  .pill.live {
    background: rgba(239,68,68,.18);
    color: #fecaca;
  }

  .pill.live::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 0 rgba(239,68,68,.7);
    animation: pulse 1.5s infinite;
  }

  .pill.upcoming {
    background: rgba(96,165,250,.16);
    color: #bfdbfe;
  }

  .pill.final {
    background: rgba(34,197,94,.16);
    color: #bbf7d0;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,.7); }
    70% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  }

  .matchup {
    display: grid;
    gap: 7px;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 10px;
  }

  .name {
    display: flex;
    align-items: center;
    gap: 7px;
    min-width: 0;
    font-size: 15px;
  }

  .mini-logo {
    width: 20px;
    height: 20px;
    object-fit: contain;
    background: rgba(255,255,255,.9);
    border-radius: 50%;
    padding: 2px;
    flex: 0 0 auto;
  }

  .name-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .score {
    font-weight: 950;
    font-size: 23px;
    min-width: 36px;
    text-align: right;
  }

  .winner .name-text,
  .winner .score {
    color: #ffffff;
    font-weight: 900;
  }

  .details {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
    margin-top: 10px;
  }

  .links {
    display: flex;
    gap: 7px;
    margin-top: 11px;
    flex-wrap: wrap;
  }

  .links a {
    color: var(--text);
    text-decoration: none;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.065);
    border-radius: 999px;
    padding: 6px 9px;
    font-size: 11px;
  }

  .links a:hover {
    background: rgba(255,255,255,.13);
  }

  .loading, .error {
    color: var(--muted);
    font-size: 13px;
    padding: 12px;
  }

  .error {
    color: #fecaca;
  }

  .footer {
    color: var(--muted);
    font-size: 11px;
    padding: 0 15px 13px;
    line-height: 1.35;
  }

  @media (max-width: 420px) {
    .topbar { align-items: flex-start; flex-direction: column; }
    .updated { white-space: normal; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="widget">
  <div class="topbar">
    <div class="title">Enoch&#39;s Scoreboard</div>
    <div id="updated" class="updated">Loading…</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="live">Live</button>
    <button class="tab" data-filter="pro">Pro</button>
    <button class="tab" data-filter="college-football">College FB</button>
    <button class="tab" data-filter="college-basketball">College MBB</button>
  </div>

  <div class="content" id="content"></div>

  <div class="footer">
    Auto-refreshes every 60 seconds. Sorted by Live → Upcoming → Final. Data comes from ESPN public scoreboard feeds.
  </div>
</div>

<script>
const REFRESH_MS = 60000;

const TEAMS = [
  {
    label: "Texas Rangers",
    group: "pro",
    sportLabel: "MLB",
    league: "Pro Teams",
    endpoint: "baseball/mlb",
    id: "13",
    logo: "https://a.espncdn.com/i/teamlogos/mlb/500/tex.png",
    teamUrl: "https://www.espn.com/mlb/team/_/name/tex/texas-rangers"
  },
  {
    label: "Dallas Cowboys",
    group: "pro",
    sportLabel: "NFL",
    league: "Pro Teams",
    endpoint: "football/nfl",
    id: "6",
    logo: "https://a.espncdn.com/i/teamlogos/nfl/500/dal.png",
    teamUrl: "https://www.espn.com/nfl/team/_/name/dal/dallas-cowboys"
  },
  {
    label: "Dallas Mavericks",
    group: "pro",
    sportLabel: "NBA",
    league: "Pro Teams",
    endpoint: "basketball/nba",
    id: "6",
    logo: "https://a.espncdn.com/i/teamlogos/nba/500/dal.png",
    teamUrl: "https://www.espn.com/nba/team/_/name/dal/dallas-mavericks"
  },
  {
    label: "Texas Longhorns",
    group: "college-football",
    sportLabel: "College Football",
    league: "College Football",
    endpoint: "football/college-football",
    id: "251",
    logo: "https://a.espncdn.com/i/teamlogos/ncaa/500/251.png",
    teamUrl: "https://www.espn.com/college-football/team/_/id/251/texas-longhorns"
  },
  {
    label: "Ole Miss Rebels",
    group: "college-football",
    sportLabel: "College Football",
    league: "College Football",
    endpoint: "football/college-football",
    id: "145",
    logo: "https://a.espncdn.com/i/teamlogos/ncaa/500/145.png",
    teamUrl: "https://www.espn.com/college-football/team/_/id/145/ole-miss-rebels"
  },
  {
    label: "SMU Mustangs",
    group: "college-football",
    sportLabel: "College Football",
    league: "College Football",
    endpoint: "football/college-football",
    id: "2567",
    logo: "https://a.espncdn.com/i/teamlogos/ncaa/500/2567.png",
    teamUrl: "https://www.espn.com/college-football/team/_/id/2567/smu-mustangs"
  },
  {
    label: "Texas Longhorns",
    group: "college-basketball",
    sportLabel: "Men's Basketball",
    league: "College Basketball",
    endpoint: "basketball/mens-college-basketball",
    id: "251",
    logo: "https://a.espncdn.com/i/teamlogos/ncaa/500/251.png",
    teamUrl: "https://www.espn.com/mens-college-basketball/team/_/id/251/texas-longhorns"
  },
  {
    label: "Ole Miss Rebels",
    group: "college-basketball",
    sportLabel: "Men's Basketball",
    league: "College Basketball",
    endpoint: "basketball/mens-college-basketball",
    id: "145",
    logo: "https://a.espncdn.com/i/teamlogos/ncaa/500/145.png",
    teamUrl: "https://www.espn.com/mens-college-basketball/team/_/id/145/ole-miss-rebels"
  },
  {
    label: "SMU Mustangs",
    group: "college-basketball",
    sportLabel: "Men's Basketball",
    league: "College Basketball",
    endpoint: "basketball/mens-college-basketball",
    id: "2567",
    logo: "https://a.espncdn.com/i/teamlogos/ncaa/500/2567.png",
    teamUrl: "https://www.espn.com/mens-college-basketball/team/_/id/2567/smu-mustangs"
  }
];

let activeFilter = "all";
let latestResults = [];

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[c]));
}

function ymd(date) {
  return date.toISOString().slice(0, 10).replaceAll("-", "");
}

function dateWindows() {
  const now = new Date();
  const ranges = [[-3, 10], [-30, 60], [-180, 240]];
  return ranges.map(([past, future]) => {
    const start = new Date(now);
    start.setDate(start.getDate() + past);
    const end = new Date(now);
    end.setDate(end.getDate() + future);
    return `${ymd(start)}-${ymd(end)}`;
  });
}

function prettyTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString([], {
    weekday: "short",
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function state(event) {
  return event?.status?.type?.state || "none";
}

function sortRank(event) {
  const s = state(event);
  if (s === "in") return 0;
  if (s === "pre") return 1;
  if (s === "post") return 2;
  return 3;
}

function chooseBestEvent(events) {
  if (!events || !events.length) return null;
  const now = Date.now();
  return events.slice().sort((a, b) => {
    const ra = sortRank(a), rb = sortRank(b);
    if (ra !== rb) return ra - rb;
    return Math.abs(new Date(a.date) - now) - Math.abs(new Date(b.date) - now);
  })[0];
}

function statusClass(event) {
  const s = state(event);
  if (s === "in") return "live";
  if (s === "pre") return "upcoming";
  if (s === "post") return "final";
  return "";
}

function statusText(event) {
  return event?.status?.type?.shortDetail || event?.status?.type?.detail || "Scheduled";
}

function gameLink(event) {
  return event?.links?.[0]?.href || "";
}

function parseTeams(event) {
  const competitors = event?.competitions?.[0]?.competitors || [];
  return competitors.slice().sort((a, b) => {
    if (a.homeAway === "away" && b.homeAway === "home") return -1;
    if (a.homeAway === "home" && b.homeAway === "away") return 1;
    return 0;
  }).map(c => ({
    name: c.team?.shortDisplayName || c.team?.displayName || "Team",
    score: c.score ?? "–",
    logo: c.team?.logo || "",
    winner: c.winner
  }));
}

function renderCard(result) {
  const { team, event, error } = result;
  const safeLabel = escapeHtml(team.label);

  if (error) {
    return `
      <div class="card" data-group="${team.group}" data-state="error">
        <div class="card-head">
          <img class="logo" src="${team.logo}" alt="${safeLabel}">
          <div class="team-title"><strong>${safeLabel}</strong><div class="sport">${escapeHtml(team.sportLabel)}</div></div>
        </div>
        <div class="error">Could not load this team right now.</div>
      </div>`;
  }

  if (!event) {
    return `
      <div class="card" data-group="${team.group}" data-state="none">
        <div class="card-head">
          <img class="logo" src="${team.logo}" alt="${safeLabel}">
          <div class="team-title"><strong>${safeLabel}</strong><div class="sport">${escapeHtml(team.sportLabel)}</div></div>
        </div>
        <div class="loading">No recent or upcoming game found.</div>
        <div class="links" style="padding:0 12px 12px;">
          <a href="${team.teamUrl}" target="_blank" rel="noopener">Team Page</a>
        </div>
      </div>`;
  }

  const teams = parseTeams(event);
  const rows = teams.map(t => `
    <div class="row ${t.winner ? "winner" : ""}">
      <div class="name">
        ${t.logo ? `<img class="mini-logo" src="${t.logo}" alt="">` : ""}
        <span class="name-text">${escapeHtml(t.name)}</span>
      </div>
      <div class="score">${escapeHtml(t.score)}</div>
    </div>`).join("");

  const venue = event?.competitions?.[0]?.venue?.fullName;
  const link = gameLink(event);
  const sClass = statusClass(event);

  return `
    <div class="card" data-group="${team.group}" data-state="${state(event)}">
      <div class="card-head">
        <img class="logo" src="${team.logo}" alt="${safeLabel}">
        <div class="team-title"><strong>${safeLabel}</strong><div class="sport">${escapeHtml(team.sportLabel)}</div></div>
      </div>
      <div class="game">
        <div class="pill ${sClass}">${escapeHtml(statusText(event))}</div>
        <div class="matchup">${rows}</div>
        <div class="details">${prettyTime(event.date)}${venue ? " · " + escapeHtml(venue) : ""}</div>
        <div class="links">
          ${link ? `<a href="${link}" target="_blank" rel="noopener">Gamecast</a>` : ""}
          <a href="${team.teamUrl}" target="_blank" rel="noopener">Team Page</a>
        </div>
      </div>
    </div>`;
}

async function fetchTeam(team) {
  for (const dates of dateWindows()) {
    const url = `https://site.api.espn.com/apis/site/v2/sports/${team.endpoint}/scoreboard?teams=${team.id}&dates=${dates}&limit=10`;
    try {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) continue;
      const data = await res.json();
      const event = chooseBestEvent(data.events || []);
      if (event) return { team, event, error: false };
    } catch (e) {}
  }
  return { team, event: null, error: false };
}

function visibleResult(r) {
  if (activeFilter === "all") return true;
  if (activeFilter === "live") return state(r.event) === "in";
  return r.team.group === activeFilter;
}

function render() {
  const content = document.getElementById("content");
  const filtered = latestResults.filter(visibleResult);

  const sections = [
    { name: "Live Now", league: "Live Now", test: r => state(r.event) === "in" },
    { name: "Pro Teams", league: "Pro Teams", test: r => r.team.league === "Pro Teams" },
    { name: "College Football", league: "College Football", test: r => r.team.league === "College Football" },
    { name: "College Basketball", league: "College Basketball", test: r => r.team.league === "College Basketball" }
  ];

  if (activeFilter === "live") {
    content.innerHTML = filtered.length
      ? `<div class="section"><div class="section-title">Live Now <span>${filtered.length} game(s)</span></div><div class="grid">${filtered.map(renderCard).join("")}</div></div>`
      : `<div class="loading">No favorite teams are live right now.</div>`;
    return;
  }

  let html = "";
  for (const section of sections) {
    if (section.name === "Live Now" && !filtered.some(section.test)) continue;
    if (activeFilter !== "all" && section.name === "Live Now") continue;

    const items = filtered
      .filter(section.test)
      .sort((a,b) => {
        const sa = sortRank(a.event), sb = sortRank(b.event);
        if (sa !== sb) return sa - sb;
        return Math.abs(new Date(a.event?.date || 0) - Date.now()) - Math.abs(new Date(b.event?.date || 0) - Date.now());
      });

    if (items.length) {
      html += `<div class="section"><div class="section-title">${section.name} <span>${items.length}</span></div><div class="grid">${items.map(renderCard).join("")}</div></div>`;
    }
  }

  content.innerHTML = html || `<div class="loading">No games found for this view.</div>`;
}

async function loadAll() {
  const content = document.getElementById("content");
  content.innerHTML = `<div class="grid">${TEAMS.map(t => `
    <div class="card">
      <div class="card-head">
        <img class="logo" src="${t.logo}" alt="${escapeHtml(t.label)}">
        <div class="team-title"><strong>${escapeHtml(t.label)}</strong><div class="sport">${escapeHtml(t.sportLabel)}</div></div>
      </div>
      <div class="loading">Loading…</div>
    </div>`).join("")}</div>`;

  latestResults = await Promise.all(TEAMS.map(t =>
    fetchTeam(t).catch(() => ({ team: t, event: null, error: true }))
  ));

  latestResults.sort((a,b) => {
    const sa = sortRank(a.event), sb = sortRank(b.event);
    if (sa !== sb) return sa - sb;
    return Math.abs(new Date(a.event?.date || 0) - Date.now()) - Math.abs(new Date(b.event?.date || 0) - Date.now());
  });

  document.getElementById("updated").textContent =
    "Updated " + new Date().toLocaleTimeString([], {hour: "numeric", minute: "2-digit"});
  render();
}

document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.getAttribute("data-filter");
    render();
  });
});

loadAll();
setInterval(loadAll, REFRESH_MS);
</script>
</body>
</html>
